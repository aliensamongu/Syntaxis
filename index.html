<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Σyntaxis v17.3.1 | The Exegetical Toolkit</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root { --teal: #1a535c; --accent: #3498db; --gold: #d4c8aa; --red: #e74c3c; --maroon: #800000; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #95a5a6; font-family: 'Times New Roman', serif; }
        #app-root { display: flex; flex-direction: column; height: 100vh; }
        
        #top-panel { 
            min-height: 165px; 
            background: #000000; 
            color: white; 
            padding: 15px 20px; 
            flex-shrink: 0; 
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box; 
        }

        .input-row { display: flex; gap: 15px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
        .input-field { padding: 8px; font-size: 16px; border-radius: 4px; border: none; }
        
        #word-bank { 
            flex: 1; 
            overflow-y: auto; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px; 
            padding: 8px 0; 
            border-top: 1px solid rgba(255,255,255,0.2); 
            align-content: flex-start;
        }
        .word { cursor: grab; font-size: 14pt; color: white; padding: 2px 4px; user-select: none; white-space: nowrap; }

        #main-container { display: flex; flex: 1; overflow: hidden; }
        #left-bar { width: 130px; background: #f0f0f0; border-right: 2px solid #7f8c8d; display: flex; flex-wrap: wrap; align-content: flex-start; gap: 8px; padding: 10px; flex-shrink: 0; }
        .shape-btn { width: 50px; height: 45px; background: white; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .shape-btn svg { width: 35px; height: 25px; }
        #canvas-wrapper { flex: 1; position: relative; background: #f4ecd8; overflow: hidden; }
        
        #right-bar { width: 400px; background: #fdfdfd; border-left: 2px solid #7f8c8d; display: flex; flex-direction: column; overflow: hidden; }
        .tab-link { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 10pt; font-weight: bold; color: #666; background: #d4d4d4; }
        .tab-link.active { background: white; color: var(--teal); border-bottom: 2px solid white; }
        .tab-content { display: none; padding: 15px; flex: 1; overflow-y: auto; }
        .tab-content.active { display: block; }
        .ms-row { font-size: 14pt; margin-bottom: 12px; line-height: 1.5; border-bottom: 1px dotted #ccc; padding-bottom: 6px; color: #000; }
        .ms-sigla { font-weight: 900; color: var(--maroon); width: 75px; display: inline-block; font-family: 'Arial', sans-serif; }
    </style>
</head>
<body>

<div id="app-root">
    <div id="top-panel">
        <div class="input-row">
            <div style="font-size: 24pt; color: white; font-family: 'Times New Roman', serif; flex-basis: 100%; margin-bottom: 5px;">
                &Sigma;yntaxis v17.3.1 | <span style="font-size: 18pt; font-weight: normal; color: #d4c8aa;">The Exegetical Toolkit</span>
            </div>
            <input type="text" id="refIn" value="1Pe 1:1" style="width: 100px;" class="input-field">
            <input type="text" id="passIn" value="Πέτρος ἀπόστολος Ἰησοῦ Χριστοῦ" style="flex:1; min-width: 300px;" class="input-field">
            <button onclick="makeBank()" style="background:var(--accent); color:white; border:none; padding: 8px 20px; border-radius:4px; cursor:pointer; font-weight:bold;">Update</button>
            <button onclick="deleteSelected()" style="background:var(--red); color:white; border:none; padding: 8px 20px; border-radius:4px; cursor:pointer; font-weight:bold;">Delete</button>
        </div>
        <div id="word-bank"></div>
    </div>

    <div id="main-container">
        <div id="left-bar">
            <div class="shape-btn" onclick="addShape('line')"><svg viewBox="0 0 100 60"><line x1="10" y1="30" x2="90" y2="30" stroke="black" stroke-width="2"/></svg></div>
            <div class="shape-btn" onclick="addShape('cross')"><svg viewBox="0 0 100 60"><line x1="10" y1="30" x2="90" y2="30" stroke="black" stroke-width="2"/><line x1="50" y1="10" x2="50" y2="50" stroke="black" stroke-width="2"/></svg></div>
            <div class="shape-btn" onclick="addShape('do')"><svg viewBox="0 0 100 60"><line x1="10" y1="30" x2="90" y2="30" stroke="black" stroke-width="2"/><line x1="10" y1="10" x2="10" y2="30" stroke="black" stroke-width="2"/></svg></div>
            <div class="shape-btn" onclick="addShape('mod')"><svg viewBox="0 0 100 60"><polyline points="30,10 30,45 80,45" fill="none" stroke="black" stroke-width="2"/></svg></div>
            <div class="shape-btn" onclick="addCurve()"><svg viewBox="0 0 100 60"><path d="M20,10 C20,30 80,30 80,50" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="6,4"/></svg></div>
            <div class="shape-btn" onclick="addShape('fork')"><svg viewBox="0 0 100 60"><line x1="10" y1="30" x2="40" y2="30" stroke="black" stroke-width="2"/><polyline points="40,30 60,10 90,10" fill="none" stroke="black" stroke-width="2"/><polyline points="40,30 60,50 90,50" fill="none" stroke="black" stroke-width="2"/></svg></div>
            <div style="font-size:7.5pt; margin-top:15px; color:#555;"><b>Drag to Edges</b> to Pan<br><b>⌘ + G:</b> Group</div>
            <button onclick="resetView()" style="width:100%; margin-top:10px; font-size:8pt; cursor:pointer;">Recenter</button>
        </div>
        <div id="canvas-wrapper"><canvas id="c"></canvas></div>
        <div id="right-bar">
            <div style="display:flex;"><div class="tab-link active" onclick="switchTab(event, 'tab-app')">Apparatus</div><div class="tab-link" onclick="switchTab(event, 'tab-ms')">Witnesses</div></div>
            <div id="tab-app" class="tab-content active">
                <button style="background:#2c3e50; color:white; width:100%; padding:10px; border:none; border-radius:4px;" onclick="openTerry()">📖 Open Terry's Commentary</button>
                <div style="font-weight:bold; color:var(--teal); margin-top:15px;">READINGS</div>
                <table id="app-table" style="width:100%; border-collapse:collapse; margin-top:5px; font-size:9pt;"></table>
                <button onclick="addRow()" style="width:100%; margin-top:10px;">+ Add Row</button>
            </div>
            <div id="tab-ms" class="tab-content">
                <div id="ms-list">
                    <div class="ms-row"><span class="ms-sigla">א (01)</span> Sinaiticus</div>
                    <div class="ms-row"><span class="ms-sigla">B (03)</span> Vaticanus</div>
                    <div class="ms-row"><span class="ms-sigla">P46</span> Beatty II</div>
                    <div class="ms-row"><span class="ms-sigla">P72</span> Bodmer VII-VIII</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = new fabric.Canvas('c', { 
        width: window.innerWidth - 530, 
        height: window.innerHeight - 165, 
        selection: true 
    });

    // --- RECALIBRATED AUTO-SCROLL ENGINE ---
    canvas.on('object:moving', function(e) {
        const vpt = canvas.viewportTransform;
        const buffer = 60; 
        const speed = 10;
        
        // Use pointer relative to the canvas element
        const pointer = canvas.getPointer(e.e);
        const rect = canvas.getElement().getBoundingClientRect();
        
        // Scroll Right
        if (e.e.clientX > rect.right - buffer) { vpt[4] -= speed; }
        // Scroll Left
        if (e.e.clientX < rect.left + buffer) { vpt[4] += speed; }
        // Scroll Down
        if (e.e.clientY > rect.bottom - buffer) { vpt[5] -= speed; }
        // Scroll Up
        if (e.e.clientY < rect.top + buffer) { vpt[5] += speed; }

        canvas.requestRenderAll();
    });

    canvas.on('mouse:wheel', function(opt) {
        let zoom = canvas.getZoom() * (0.999 ** opt.e.deltaY);
        zoom = Math.min(Math.max(0.01, zoom), 20);
        canvas.zoomToPoint({ x: opt.e.offsetX, y: opt.e.offsetY }, zoom);
        opt.e.preventDefault();
    });

    function resetView() { canvas.setViewportTransform([1, 0, 0, 1, 0, 0]); canvas.setZoom(1); }

    function deleteSelected() {
        const active = canvas.getActiveObjects();
        active.forEach(obj => {
            if (obj.curveRef) {
                canvas.remove(obj.curveRef);
                obj.curveRef.handles.forEach(h => canvas.remove(h));
            } else if (obj.handles) {
                obj.handles.forEach(h => canvas.remove(h));
                canvas.remove(obj);
            } else {
                canvas.remove(obj);
            }
        });
        canvas.discardActiveObject().renderAll();
    }

    window.addEventListener('keydown', (e) => {
        if (document.activeElement.tagName === "INPUT") return;
        if (e.key === "Delete" || e.key === "Backspace") deleteSelected();
        if ((e.ctrlKey || e.metaKey) && e.key === 'g' && !e.shiftKey) {
            e.preventDefault();
            if (canvas.getActiveObject()?.type === 'activeSelection') canvas.getActiveObject().toGroup();
            canvas.requestRenderAll();
        }
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'G') {
            e.preventDefault();
            if (canvas.getActiveObject()?.type === 'group') canvas.getActiveObject().toActiveSelection();
            canvas.requestRenderAll();
        }
    });

    function addCurve() {
        const pts = [{x:100,y:100},{x:150,y:100},{x:100,y:200},{x:150,y:200}];
        const curve = new fabric.Path(`M ${pts[0].x} ${pts[0].y} C ${pts[1].x} ${pts[1].y} ${pts[2].x} ${pts[2].y} ${pts[3].x} ${pts[3].y}`, {
            stroke:'black', strokeWidth:1.5, fill:'', strokeDashArray:[10,5], selectable:true, objectCaching:false, strokeUniform:true
        });
        curve.handles = [];
        function makeH(i) {
            const h = new fabric.Circle({ left:pts[i].x, top:pts[i].y, radius:8, fill:'white', stroke:'#3498db', strokeWidth:2, originX:'center', originY:'center', hasControls:false, hasBorders:false });
            h.curveRef = curve;
            h.on('moving', () => {
                pts[i].x = h.left; pts[i].y = h.top;
                curve.path[0][1] = pts[0].x; curve.path[0][2] = pts[0].y;
                curve.path[1][1] = pts[1].x; curve.path[1][2] = pts[1].y;
                curve.path[1][3] = pts[2].x; curve.path[1][4] = pts[2].y;
                curve.path[1][5] = pts[3].x; curve.path[1][6] = pts[3].y;
                curve.set({strokeDashArray:[10,5]});
                canvas.requestRenderAll();
            });
            return h;
        }
        canvas.add(curve);
        for(let i=0; i<4; i++) { const h = makeH(i); curve.handles.push(h); canvas.add(h); }
    }

    function addShape(t) {
        const p = { stroke:'#000', strokeWidth:1.5, fill:'transparent', strokeUniform:true };
        let obj;
        if(t==='line') obj = new fabric.Rect({width:150, height:1.5, fill:'black', strokeUniform:true});
        else if(t==='cross') obj = new fabric.Group([new fabric.Rect({width:100,height:1.5,fill:'black',top:15, strokeUniform:true}), new fabric.Rect({width:1.5,height:30,fill:'black',left:50, strokeUniform:true})]);
        else if(t==='do') obj = new fabric.Group([new fabric.Rect({width:150,height:1.5,fill:'black',top:25, strokeUniform:true}), new fabric.Rect({width:1.5,height:25,fill:'black', strokeUniform:true})]);
        else if(t==='mod') obj = new fabric.Polyline([{x:0,y:0},{x:0,y:45},{x:75,y:45}], p);
        else obj = new fabric.Group([new fabric.Line([0,25,30,25],p), new fabric.Polyline([{x:30,y:25},{x:55,y:0},{x:100,y:0}],p), new fabric.Polyline([{x:30,y:25},{x:55,y:50},{x:100,y:50}],p)]);
        canvas.add(obj.set({left:250, top:250})).setActiveObject(obj).renderAll();
    }

    function openTerry() {
        const ref = document.getElementById('refIn').value.toLowerCase().trim();
        const m = ref.match(/^([1-3]?[a-z]+)\s*(\d+):(\d+)$/);
        if(!m) return alert("Use: Rom 1:1");
        const library = {"1pe":"261pt","2pe":"272pt","rom":"14rom","col":"51col","jam":"28jam"};
        const id = library[m[1].substring(0,3)] || "01mat";
        window.open(`https://bterry.com/tc2/lay${id}.htm#${m[1].substring(0,3)}${m[2]}_${m[3]}`, '_blank');
    }

    function makeBank() {
        const bank = document.getElementById('word-bank'); bank.innerHTML = '';
        document.getElementById('passIn').value.split(/\s+/).forEach(t => {
            const s = document.createElement('span'); s.className = 'word'; s.textContent = t; s.draggable = true;
            s.ondragstart = (e) => e.dataTransfer.setData('text/plain', t);
            bank.appendChild(s);
        });
    }

    canvas.on('drop', opt => {
        const t = new fabric.IText(opt.e.dataTransfer.getData('text/plain'), { left: canvas.getPointer(opt.e).x, top: canvas.getPointer(opt.e).y, fontSize: 26, fontFamily: 'Times New Roman' });
        canvas.add(t).setActiveObject(t).renderAll();
    });
    canvas.on('dragover', e => e.e.preventDefault());
    function addRow() { document.getElementById('app-table').innerHTML += `<tr><td contenteditable style="border:1px solid #ddd; padding:5px;"></td><td contenteditable style="border:1px solid #ddd; padding:5px;"></td></tr>`; }
    function switchTab(e, id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active'); e.currentTarget.classList.add('active');
    }
    window.onload = makeBank;
</script>
</body>
</html>
