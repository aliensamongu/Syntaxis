<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Σyntaxis | The Exegetical Toolbox</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root { --accent: #3498db; --red: #e74c3c; --dark: #000; --gold: #d4c8aa; --maroon: #800000; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #95a5a6; font-family: 'Times New Roman', serif; }
        #app-root { display: flex; flex-direction: column; height: 100vh; }
        
        #top-panel { height: 180px; background: var(--dark); color: white; padding: 15px 20px; flex-shrink: 0; display: flex; flex-direction: column; box-sizing: border-box; z-index: 100; border-bottom: 2px solid var(--gold); }
        .input-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
        .input-field { padding: 8px; font-size: 14px; border-radius: 4px; border: none; background: #fff; color: #333; }
        
        #word-bank { flex: 1; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 0; align-content: flex-start; }
        .word { cursor: pointer; font-size: 14pt; color: white; padding: 2px 6px; user-select: none; transition: all 0.2s; border-radius: 3px; border: 1px solid transparent; }
        .word:hover { background: rgba(255,255,255,0.1); }
        .word.selected { background: var(--gold); color: var(--dark); font-weight: bold; border-color: white; }
        .word.used { text-decoration: line-through; opacity: 0.3; color: #7f8c8d; cursor: default; pointer-events: none; }

        #main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        #left-bar { width: 140px; background: #f0f0f0; border-right: 2px solid #7f8c8d; display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: 60px; gap: 8px; padding: 10px; z-index: 50; }
        .shape-btn { background: white; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .shape-btn svg { width: 45px; height: 45px; pointer-events: none; }

        #canvas-wrapper { flex: 1; position: relative; background: #f4ecd8; overflow: auto; }
        
        #right-bar { width: 380px; background: #fdfdfd; border-left: 2px solid #7f8c8d; display: flex; flex-direction: column; z-index: 50; transition: margin-right 0.3s ease; position: relative; }
        #right-bar.collapsed { margin-right: -380px; }
        #collapse-btn { position: absolute; left: -25px; top: 50%; transform: translateY(-50%); width: 25px; height: 60px; background: #7f8c8d; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 5px 0 0 5px; z-index: 60; }

        .tab-link { flex: 1; padding: 12px 5px; text-align: center; cursor: pointer; font-size: 12pt; font-weight: bold; color: #666; background: #d4d4d4; }
        .tab-link.active { background: white; color: var(--maroon); border-bottom: 2px solid white; }
        .tab-content { display: none; padding: 15px; flex: 1; overflow-y: auto; }
        .tab-content.active { display: block; }
        
        .ms-table { width: 100%; border-collapse: collapse; font-size: 14pt; background: white; margin-bottom: 25px; }
        .ms-table th { background: #eee; padding: 10px; border: 1px solid #ddd; text-align: left; }
        .ms-table td { padding: 10px; border: 1px solid #eee; vertical-align: top; }
        .ms-group-header { background: #f9f2e0; font-weight: bold; padding: 12px; margin: 15px 0 8px 0; border-left: 6px solid var(--gold); font-size: 15pt; color: var(--maroon); }
    </style>
</head>
<body>

<div id="app-root">
    <div id="top-panel">
        <div class="input-row">
            <div style="display:flex; flex-direction:column; margin-right: 25px;">
                <div style="font-size: 24pt; color: var(--gold); font-weight: bold;">&Sigma;yntaxis</div>
                <div style="font-size: 10pt; color: white; font-style: italic; opacity: 0.8;">The Exegetical Toolbox</div>
            </div>
            <input type="text" id="passIn" placeholder="Paste Verse..." class="input-field" style="flex:1;" oninput="makeBank()">
            <button onclick="addElliptical()" style="background:var(--accent); color:white; border:none; padding: 8px 12px; border-radius:4px; cursor:pointer;">(Ellipsis)</button>
            <button onclick="window.open('https://bterry.com/tc/index.htm', '_blank')" style="background:var(--maroon); color:white; border:none; padding: 8px 12px; border-radius:4px; cursor:pointer;">Terry's TC</button>
            <button onclick="saveAs()" style="background:#27ae60; color:white; border:none; padding: 8px 12px; border-radius:4px; cursor:pointer;">Save</button>
            <button onclick="document.getElementById('loadInput').click()" style="background:#e67e22; color:white; border:none; padding: 8px 12px; border-radius:4px; cursor:pointer;">Load</button>
            <input type="file" id="loadInput" style="display:none" accept=".json" onchange="loadProject(event)">
        </div>
        <div id="word-bank"></div>
    </div>

    <div id="main-container">
        <div id="left-bar">
            <div class="shape-btn" onclick="addShape('line')"><svg><line x1="5" y1="22" x2="40" y2="22" stroke="black" stroke-width="2"/></svg></div>
            <div class="shape-btn" onclick="addShape('cross')"><svg><line x1="5" y1="22" x2="40" y2="22" stroke="black" stroke-width="2"/><line x1="22" y1="5" x2="22" y2="40" stroke="black" stroke-width="2"/></svg></div>
            <div class="shape-btn" onclick="addShape('do')"><svg><line x1="5" y1="22" x2="40" y2="22" stroke="black" stroke-width="2"/><line x1="12" y1="10" x2="12" y2="22" stroke="black" stroke-width="2"/></svg></div>
            <div class="shape-btn" onclick="addShape('dblacc')"><svg><line x1="5" y1="22" x2="40" y2="22" stroke="black" stroke-width="2"/><line x1="12" y1="10" x2="12" y2="22" stroke="black" stroke-width="2"/><line x1="25" y1="10" x2="25" y2="22" stroke="black" stroke-width="2"/></svg></div>
            <div class="shape-btn" onclick="addShape('shelf')"><svg><polyline points="10,25 10,15 35,15 35,25" fill="none" stroke="black" stroke-width="2"/></svg></div>
            <div class="shape-btn" onclick="addShape('smart-mod')"><svg><polyline points="15,10 15,35 40,35" fill="none" stroke="black" stroke-width="2" transform="skewX(-20)"/></svg></div>
            <div class="shape-btn" onclick="addShape('frame')"><svg><polyline points="5,22 15,22 25,10 40,10 M25,10 25,35 40,35" stroke="black" stroke-width="2" fill="none"/></svg></div>
        </div>
        
        <div id="canvas-wrapper"><canvas id="c"></canvas></div>
        
        <div id="right-bar">
            <div id="collapse-btn" onclick="toggleSidebar()">▶</div>
            <div style="display:flex;">
                <div class="tab-link active" onclick="switchTab(event, 'tab-app')">Apparatus</div>
                <div class="tab-link" onclick="switchTab(event, 'tab-ms')">Witnesses</div>
                <div class="tab-link" onclick="switchTab(event, 'tab-abbr')">Abbr.</div>
            </div>
            
            <div id="tab-app" class="tab-content active">
                <table id="variant-table" class="ms-table">
                    <thead><tr><th>Reading</th><th>Witnesses</th></tr></thead>
                    <tbody><tr><td contenteditable="true"></td><td contenteditable="true"></td></tr></tbody>
                </table>
                <button onclick="addVariantRow()" style="width:100%; padding:10px;">+ Add Variant Row</button>
            </div>

            <div id="tab-ms" class="tab-content">
                <div class="ms-group-header">Greek Papyri</div>
                <table class="ms-table">
                    <thead><tr><th>Sym</th><th>Cent.</th><th>Kind</th></tr></thead>
                    <tr><td>p1</td><td>III</td><td>Alex</td></tr>
                    <tr><td>p45</td><td>III</td><td>Caes</td></tr>
                    <tr><td>p46</td><td>c.200</td><td>Alex</td></tr>
                </table>
                <div class="ms-group-header">Uncials</div>
                <table class="ms-table">
                    <thead><tr><th>Sym</th><th>Name</th><th>Cent.</th></tr></thead>
                    <tr><td>א (01)</td><td>Sinaiticus</td><td>IV</td></tr>
                    <tr><td>B (03)</td><td>Vaticanus</td><td>IV</td></tr>
                </table>
            </div>

            <div id="tab-abbr" class="tab-content">
                <div class="ms-group-header">Critical Marks</div>
                <table class="ms-table">
                    <tr><td><b>vid</b></td><td>apparently</td></tr>
                    <tr><td><b>supp</b></td><td>supplied text</td></tr>
                    <tr><td><b>*</b></td><td>original reading</td></tr>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = new fabric.Canvas('c', { width: 3000, height: 3000, preserveObjectStacking: true });
    const lineStyle = { stroke: 'black', strokeWidth: 2, fill: 'transparent', strokeUniform: true, cornerColor: '#3498db', cornerSize: 10, transparentCorners: false };
    let _clipboard = null;

    function syncWordBank() {
        const wordsInBank = document.querySelectorAll('.word');
        const canvasIndices = canvas.getObjects().filter(o => o.tokenIndex !== undefined).map(o => o.tokenIndex);
        wordsInBank.forEach(wordSpan => {
            const idx = parseInt(wordSpan.getAttribute('data-index'));
            if (canvasIndices.includes(idx)) {
                wordSpan.classList.add('used');
                wordSpan.classList.remove('selected');
                wordSpan.draggable = false;
            } else {
                wordSpan.classList.remove('used');
                wordSpan.draggable = true;
            }
        });
    }
    canvas.on('object:added', syncWordBank);
    canvas.on('object:removed', syncWordBank);

    window.addEventListener('keydown', (e) => {
        if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName) || document.activeElement.isContentEditable) return;
        const activeObj = canvas.getActiveObject();
        const step = e.shiftKey ? 10 : 1;

        if (e.key === "Delete" || e.key === "Backspace") {
            canvas.getActiveObjects().forEach(obj => canvas.remove(obj));
            canvas.discardActiveObject().renderAll();
        }

        if (activeObj && e.key.startsWith("Arrow")) {
            e.preventDefault();
            if (e.key === "ArrowUp") activeObj.top -= step;
            if (e.key === "ArrowDown") activeObj.top += step;
            if (e.key === "ArrowLeft") activeObj.left -= step;
            if (e.key === "ArrowRight") activeObj.left += step;
            activeObj.setCoords(); canvas.renderAll();
        }

        if (e.ctrlKey || e.metaKey) {
            if (e.key === 'c') { canvas.getActiveObject()?.clone(cloned => { _clipboard = cloned; }); }
            if (e.key === 'v') {
                if (!_clipboard) return;
                _clipboard.clone(cloned => {
                    canvas.discardActiveObject();
                    cloned.set({ left: cloned.left + 20, top: cloned.top + 20, evented: true });
                    if (cloned.type === 'activeSelection') {
                        cloned.canvas = canvas;
                        cloned.forEachObject(obj => canvas.add(obj));
                        cloned.setCoords();
                    } else { canvas.add(cloned); }
                    _clipboard.top += 20; _clipboard.left += 20;
                    canvas.setActiveObject(cloned);
                    canvas.requestRenderAll();
                });
            }
            if (e.key === 'g' && activeObj?.type === 'activeSelection') { e.preventDefault(); activeObj.toGroup(); canvas.requestRenderAll(); }
            if (e.key === 'u' && activeObj?.type === 'group') { e.preventDefault(); activeObj.toActiveSelection(); canvas.requestRenderAll(); }
        }
    });

    function makeBank() {
        const bank = document.getElementById('word-bank');
        const val = document.getElementById('passIn').value.trim();
        bank.innerHTML = ''; if(!val) return;
        val.split(/\s+/).forEach((t, i) => {
            const s = document.createElement('span');
            s.className = 'word'; s.textContent = t; s.setAttribute('data-index', i);
            s.draggable = true;
            s.onclick = () => s.classList.toggle('selected');
            s.ondragstart = (e) => {
                const selected = document.querySelectorAll('.word.selected');
                const data = selected.length > 0 ? 
                    Array.from(selected).map(w => ({text: w.textContent, idx: parseInt(w.getAttribute('data-index'))})) : 
                    [{text: t, idx: i}];
                e.dataTransfer.setData('text/plain', JSON.stringify(data));
            };
            bank.appendChild(s);
        });
        syncWordBank();
    }

    canvas.on('drop', opt => {
        const raw = opt.e.dataTransfer.getData('text/plain'); if(!raw) return;
        try {
            const words = JSON.parse(raw);
            const ptr = canvas.getPointer(opt.e);
            words.forEach((item, i) => {
                const it = new fabric.IText(item.text, { left: ptr.x + (i*15), top: ptr.y + (i*15), fontSize: 24, fontFamily: 'Times New Roman' });
                it.tokenIndex = item.idx;
                canvas.add(it);
            });
            document.querySelectorAll('.word.selected').forEach(w => w.classList.remove('selected'));
        } catch(e) {}
    });

    function addShape(type) {
        let obj;
        if(type==='line') obj = new fabric.Line([0,0,150,0], lineStyle);
        else if(type==='cross') obj = new fabric.Group([new fabric.Line([0,20,150,20], lineStyle), new fabric.Line([75,0,75,40], lineStyle)], {strokeUniform:true});
        else if(type==='do') obj = new fabric.Group([new fabric.Line([0,20,150,20], lineStyle), new fabric.Line([40,5,40,20], lineStyle)], {strokeUniform:true});
        else if(type==='dblacc') obj = new fabric.Group([new fabric.Line([0,20,180,20], lineStyle), new fabric.Line([50,5,50,20], lineStyle), new fabric.Line([110,5,110,20], lineStyle)], {strokeUniform:true});
        else if(type==='frame') obj = new fabric.Group([new fabric.Line([0,22,15,22],lineStyle), new fabric.Line([15,22,25,10],lineStyle), new fabric.Line([15,22,25,35],lineStyle), new fabric.Line([25,10,125,10],lineStyle), new fabric.Line([25,35,125,35],lineStyle)], {strokeUniform:true});
        else if(type==='shelf' || type==='smart-mod') {
            const pts = (type==='shelf') ? [{x:0,y:40},{x:0,y:0},{x:100,y:0},{x:100,y:40}] : [{x:30,y:0},{x:0,y:60},{x:120,y:60}];
            createSmartPoly(pts, 300, 300);
            return;
        }
        obj.set({ left: 300, top: 300 });
        canvas.add(obj); canvas.setActiveObject(obj); canvas.renderAll();
    }

    function createSmartPoly(points, left, top) {
        const poly = new fabric.Polyline(points, { ...lineStyle, left, top, objectCaching: false, hasBorders: false, lockRotation: true, lockScalingX: true, lockScalingY: true });
        poly.controls = poly.points.reduce((acc, point, index) => {
            acc['p' + index] = new fabric.Control({
                positionHandler: (dim, finalMatrix, fabricObject) => fabric.util.transformPoint({ x: fabricObject.points[index].x - fabricObject.pathOffset.x, y: fabricObject.points[index].y - fabricObject.pathOffset.y }, finalMatrix),
                actionHandler: (eventData, transform, x, y) => {
                    let polygon = transform.target;
                    let mouseLocal = polygon.toLocalPoint(new fabric.Point(x, y), 'center', 'center');
                    polygon.points[index] = { x: mouseLocal.x + polygon.pathOffset.x, y: mouseLocal.y + polygon.pathOffset.y };
                    return true;
                },
                cursorStyle: 'crosshair',
                render: (ctx, l, t) => { ctx.save(); ctx.fillStyle = '#3498db'; ctx.beginPath(); ctx.arc(l, t, 6, 0, 2*Math.PI); ctx.fill(); ctx.restore(); }
            });
            return acc;
        }, {});
        canvas.add(poly); canvas.setActiveObject(poly); canvas.renderAll();
    }

    function saveAs() {
        const appRows = Array.from(document.querySelectorAll('#variant-table tbody tr')).map(tr => ({ reading: tr.cells[0].innerText, witnesses: tr.cells[1].innerText }));
        const data = { canvas: canvas.toJSON(['tokenIndex', 'points']), verse: document.getElementById('passIn').value, apparatus: appRows };
        const link = document.createElement('a');
        link.href = URL.createObjectURL(new Blob([JSON.stringify(data)], {type: "application/json"}));
        link.download = "syntaxis_project.json"; link.click();
    }

    function loadProject(e) {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (f) => {
            const data = JSON.parse(f.target.result);
            document.getElementById('passIn').value = data.verse || "";
            makeBank();
            canvas.loadFromJSON(data.canvas, () => {
                canvas.getObjects().forEach(obj => { if(obj.type === 'polyline') createSmartPoly(obj.points, obj.left, obj.top); });
                canvas.renderAll(); syncWordBank();
            });
            if(data.apparatus) {
                const tbody = document.querySelector('#variant-table tbody'); tbody.innerHTML = "";
                data.apparatus.forEach(row => {
                    const tr = tbody.insertRow();
                    tr.innerHTML = `<td contenteditable="true">${row.reading}</td><td contenteditable="true">${row.witnesses}</td>`;
                });
            }
        };
        reader.readAsText(file);
    }

    function toggleSidebar() { document.getElementById('right-bar').classList.toggle('collapsed'); }
    function switchTab(e, id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active'); e.currentTarget.classList.add('active');
    }
    function addVariantRow() { const row = document.querySelector('#variant-table tbody').insertRow(); row.innerHTML = `<td contenteditable="true"></td><td contenteditable="true"></td>`; }
    function addElliptical() { const t = prompt("Word:"); if(t) canvas.add(new fabric.IText(`(${t})`, { left: 300, top: 300, fontSize: 24, fontStyle: 'italic', opacity: 0.6 })); }
</script>
</body>
</html>
