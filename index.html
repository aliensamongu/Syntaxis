<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Syntaxis v11.2 | The Exegetical Toolkit</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root { --teal: #1a535c; --accent: #3498db; --gold: #d4c8aa; --light: #fdfdfd; --red: #e74c3c; --maroon: #800000; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Times New Roman', serif; background: #bdc3c7; }
        #app-root { display: flex; height: 100vh; flex-direction: column; }
        
        #top-panel { background: var(--teal); color: white; padding: 12px 20px; z-index: 1000; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .header-main { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-bottom: 10px; }
        
        /* Fixed Word Bank height with scrolling */
        #word-bank { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            padding: 8px 0; 
            border-top: 1px solid rgba(255,255,255,0.2); 
            height: 100px; 
            overflow-y: auto; 
            scrollbar-width: thin;
        }
        #word-bank::-webkit-scrollbar { width: 6px; }
        #word-bank::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }

        .word-item { cursor: pointer; font-size: 18px; color: white; user-select: none; padding: 2px 5px; border-radius: 3px; }
        .word-item:hover { background: rgba(255,255,255,0.1); }
        .word-item.used { text-decoration: line-through; opacity: 0.3; pointer-events: none; }

        #main-layout { display: flex; flex: 1; width: 100vw; overflow: hidden; }
        #left-sidebar { width: 90px; background: #eee; border-right: 1px solid #95a5a6; display: flex; flex-direction: column; align-items: center; padding: 10px; overflow-y: auto; flex-shrink: 0; }
        #right-sidebar { width: 220px; background: #f8f9fa; border-left: 1px solid #95a5a6; display: flex; flex-direction: column; padding: 12px; overflow-y: auto; flex-shrink: 0; font-family: sans-serif; }
        #workspace { flex-grow: 1; background: #95a5a6; position: relative; overflow: hidden; }

        .tool-title { font-size: 9px; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; border-bottom: 1px solid #ccc; padding-bottom: 3px; margin: 12px 0 8px 0; text-align: center; }
        .shape-btn { width: 70px; height: 50px; background: white; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .shape-btn svg { width: 100%; height: 100%; }
        .shape-btn path, .shape-btn line, .shape-btn polyline { stroke: #333; fill: none; stroke-width: 2.5; }

        textarea { width: 100%; height: 80px; border: 1px solid #ddd; border-radius: 4px; padding: 6px; font-size: 13px; resize: none; margin-bottom: 8px; box-sizing: border-box; }
        .style-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        .color-swatch { width: 100%; aspect-ratio: 1; border-radius: 2px; cursor: pointer; border: 1px solid transparent; }
        .color-swatch.active { border-color: #000; box-shadow: inset 0 0 0 1px #fff; }
        
        button { padding: 8px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 5px; font-size: 11px; text-transform: uppercase; }
        .btn-maroon { background: var(--maroon); color: white; }
        .btn-green { background: #27ae60; color: white; }
        .btn-red { background: var(--red); color: white; }

        #note-popup { position: absolute; display: none; background: white; border: 2px solid var(--teal); padding: 10px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 2000; width: 220px; }
    </style>
</head>
<body>

<div id="app-root">
    <div id="top-panel">
        <div class="header-main">
            <div>
                <span style="font-size:22px; color:var(--gold); font-weight: bold;">Syntaxis:</span>
                <span style="font-size:16px; color:var(--light); font-style: italic; margin-left: 5px;">The Exegetical Toolkit</span>
            </div>
            <div style="display:flex; gap:8px; width:65%;">
                <input type="text" id="refInput" style="width:130px; text-align:center; border-radius:3px; border:none; padding:6px;" value="Colossians 1:1">
                <input type="text" id="passageInput" value="Παῦλος ἀπόστολος Χριστοῦ Ἰησοῦ" style="flex-grow:1; padding:6px; border-radius:3px; border:none;">
                <button style="width:auto; background:var(--accent); color:white; margin:0; padding: 0 15px;" onclick="generateWordBank()">Update</button>
            </div>
        </div>
        <div id="word-bank"></div>
    </div>

    <div id="main-layout">
        <div id="left-sidebar">
            <div class="tool-title">Shapes</div>
            <div class="shape-btn" onclick="addShape('standard')"><svg viewBox="0 0 100 60"><line x1="10" y1="30" x2="90" y2="30"/></svg></div>
            <div class="shape-btn" onclick="addShape('subj-pred')"><svg viewBox="0 0 100 60"><line x1="10" y1="30" x2="90" y2="30"/><line x1="50" y1="10" x2="50" y2="50"/></svg></div>
            <div class="shape-btn" onclick="addShape('l-modifier')"><svg viewBox="0 0 100 60"><polyline points="20,15 20,45 80,45"/></svg></div>
            <div class="shape-btn" onclick="addShape('slanted-modifier')"><svg viewBox="0 0 100 60"><polyline points="40,15 20,45 80,45"/></svg></div>
            <div class="shape-btn" onclick="addShape('vertical-modifier')"><svg viewBox="0 0 100 60"><polyline points="30,10 30,50 80,50"/></svg></div>
            <div class="shape-btn" onclick="addShape('predicate-fork')"><svg viewBox="0 0 100 60"><path d="M10,30 L30,30 L55,10 L90,10 M30,30 L55,50 L90,50 M55,10 L55,50" /></svg></div>
            <div class="shape-btn" onclick="addShape('dashed-curve')"><svg viewBox="0 0 100 60"><path d="M10,45 C30,15 70,15 90,45" stroke-dasharray="3,3"/></svg></div>
        </div>

        <div id="workspace">
            <canvas id="main-canvas"></canvas>
            <div id="note-popup">
                <textarea id="note-text" placeholder="Word note..."></textarea>
                <button class="btn-maroon" onclick="closeNote()">Save Note</button>
            </div>
        </div>

        <div id="right-sidebar">
            <div class="tool-title">Analysis</div>
            <button class="btn-maroon" onclick="addFootnoteTag()">Add [α] Tag</button>
            <div class="tool-title">Apparatus</div>
            <textarea id="critNotes" placeholder="Manuscript notes..."></textarea>
            <div class="tool-title">Color</div>
            <div id="color-grid" class="style-grid"></div>
            <div class="tool-title">Project</div>
            <button class="btn-green" onclick="saveWithPicker()">Save As...</button>
            <button class="btn-red" onclick="deleteSelected()">Delete</button>
        </div>
    </div>
</div>

<script>
    const canvas = new fabric.Canvas('main-canvas', { width: 5000, height: 5000, backgroundColor: '#f4ecd8' });
    let activeColor = '#000000';
    let currentOpenNoteObj = null;

    fabric.Object.prototype.set({
        transparentCorners: false,
        cornerColor: '#3498db',
        cornerStyle: 'circle',
        cornerSize: 10,
        borderColor: '#3498db'
    });

    // Keyboard Precision & Global Controls
    window.addEventListener('keydown', (e) => {
        if (['TEXTAREA', 'INPUT'].includes(document.activeElement.tagName)) return;

        const activeObjects = canvas.getActiveObjects();
        if (activeObjects.length === 0) return;

        if (e.key === 'Delete' || e.key === 'Backspace') {
            deleteSelected();
            e.preventDefault();
        }

        const step = e.shiftKey ? 10 : 1;
        let moved = false;
        if (e.key === 'ArrowUp') { activeObjects.forEach(o => o.top -= step); moved = true; }
        if (e.key === 'ArrowDown') { activeObjects.forEach(o => o.top += step); moved = true; }
        if (e.key === 'ArrowLeft') { activeObjects.forEach(o => o.left -= step); moved = true; }
        if (e.key === 'ArrowRight') { activeObjects.forEach(o => o.left += step); moved = true; }

        if (moved) {
            activeObjects.forEach(o => {
                o.setCoords();
                if(o.isCurvePart) o.fire('moving'); 
                if(o.type === 'i-text') updateDotPosition(o);
            });
            canvas.requestRenderAll();
            e.preventDefault();
        }
    });

    // Dynamic Book Mapping & BLB Integration
    function openBLB(wordText) {
        const ref = document.getElementById('refInput').value.trim();
        // Regex to capture books (including numbered ones like 1 John) and chapter:verse
        const match = ref.match(/^(\d?\s?[a-zA-Z]+)\s+(\d+)[:\.](\d+)/i);
        
        if (match) {
            let bookName = match[1].trim();
            let chapter = match[2];
            let verse = match[3];

            // Build abbreviation: First character (digit) + next word's first two chars
            let bookParts = bookName.split(' ');
            let abbrev = "";
            if (bookParts.length > 1) {
                abbrev = bookParts[0] + bookParts[1].substring(0, 2);
            } else {
                abbrev = bookName.substring(0, 3);
            }

            const isGreek = /[\u0370-\u03FF]/.test(wordText);
            const version = isGreek ? 'mgnt' : 'kjv';
            window.open(`https://www.blueletterbible.org/${version}/${abbrev}/${chapter}/${verse}`, '_blank');
        }
    }

    canvas.on('mouse:down', function(opt) {
        if (!opt.target) return;
        const isOption = opt.e.altKey;
        const isCmdCtrl = opt.e.metaKey || opt.e.ctrlKey;

        if (isOption && !isCmdCtrl && opt.target.type === 'i-text') {
            openBLB(opt.target.text);
            return;
        }
        if (isOption && isCmdCtrl && opt.target.type === 'i-text') {
            showNotePopup(opt.target, opt.e.clientX, opt.e.clientY);
            return;
        }
        if (opt.target.isRedDot) showNotePopup(opt.target.parentWord, opt.e.clientX, opt.e.clientY);
    });

    function showNotePopup(obj, x, y) {
        currentOpenNoteObj = obj;
        const pop = document.getElementById('note-popup');
        pop.style.display = 'block';
        pop.style.left = Math.min(x, window.innerWidth - 250) + 'px';
        pop.style.top = Math.min(y, window.innerHeight - 150) + 'px';
        document.getElementById('note-text').value = obj.noteData || "";
        document.getElementById('note-text').focus();
    }

    function closeNote() {
        if (currentOpenNoteObj) {
            const val = document.getElementById('note-text').value;
            currentOpenNoteObj.noteData = val;
            if (val.trim() !== "") {
                if (!currentOpenNoteObj.redDot) {
                    const dot = new fabric.Circle({ radius: 4, fill: 'red', isRedDot: true, parentWord: currentOpenNoteObj, selectable: true });
                    currentOpenNoteObj.redDot = dot;
                    canvas.add(dot);
                }
                updateDotPosition(currentOpenNoteObj);
            } else if (currentOpenNoteObj.redDot) {
                canvas.remove(currentOpenNoteObj.redDot);
                currentOpenNoteObj.redDot = null;
            }
        }
        document.getElementById('note-popup').style.display = 'none';
        canvas.renderAll();
    }

    function updateDotPosition(word) {
        if (word.redDot) {
            word.redDot.set({ left: word.left + (word.width / 2) - 2, top: word.top - 10 });
            word.redDot.setCoords();
        }
    }
    canvas.on('object:moving', (e) => updateDotPosition(e.target));

    const colors = ['#000000', '#1a535c', '#3498db', '#e74c3c', '#27ae60', '#f39c12', '#8e44ad', '#800000'];
    const grid = document.getElementById('color-grid');
    colors.forEach(c => {
        const div = document.createElement('div');
        div.className = 'color-swatch' + (c === activeColor ? ' active' : '');
        div.style.backgroundColor = c;
        div.onclick = () => {
            activeColor = c;
            document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
            div.classList.add('active');
            canvas.getActiveObjects().forEach(obj => {
                if (obj.type === 'i-text') obj.set('fill', c);
                else if (obj.type === 'group') obj.getObjects().forEach(o => o.set('stroke', c));
                else obj.set('stroke', c);
            });
            canvas.renderAll(); 
        };
        grid.appendChild(div);
    });

    function addShape(type) {
        const s = { stroke: activeColor, strokeWidth: 2.5, fill: 'transparent', strokeUniform: true };
        let obj;
        if (type === 'standard') obj = new fabric.Line([0,0,140,0], s);
        else if (type === 'subj-pred') obj = new fabric.Group([new fabric.Line([-50,0,50,0], s), new fabric.Line([0,-25,0,25], s)]);
        else if (type === 'l-modifier') obj = new fabric.Polyline([{x:0,y:0},{x:0,y:40},{x:80,y:40}], s);
        else if (type === 'slanted-modifier') obj = new fabric.Polyline([{x:30,y:0},{x:0,y:40},{x:80,y:40}], s);
        else if (type === 'vertical-modifier') obj = new fabric.Polyline([{x:0,y:0},{x:0,y:50},{x:60,y:50}], s);
        else if (type === 'predicate-fork') obj = new fabric.Path('M 0 30 L 25 30 L 55 10 L 100 10 M 25 30 L 55 50 L 100 50 M 55 10 L 55 50', s);
        else if (type === 'dashed-curve') { createUniversalCurve(400, 400); return; }
        if(obj) { obj.set({left: 300, top: 300}); canvas.add(obj).setActiveObject(obj).renderAll(); }
    }

    function createUniversalCurve(x, y) {
        const p = new fabric.Path(`M ${x} ${y} Q ${x+100} ${y-100} ${x+200} ${y}`, {
            stroke: activeColor, strokeWidth: 2.5, fill: 'transparent', strokeDashArray: [5,5],
            selectable: true, hasBorders: false, hasControls: false, objectCaching: false, isCurvePart: true, isMainCurvePath: true
        });
        const makeH = (hx, hy, color) => new fabric.Circle({ left: hx, top: hy, radius: 8, fill: color, originX: 'center', originY: 'center', hasControls: false, selectable: true, isHandle: true, isCurvePart: true });
        const start = makeH(x, y, '#1a535c'); const end = makeH(x + 200, y, '#1a535c'); const control = makeH(x + 100, y - 50, '#3498db');
        p.assocHandles = [start, end, control];
        const sync = () => { p.set({ path: [['M', start.left, start.top], ['Q', control.left, control.top, end.left, end.top]] }); canvas.renderAll(); };
        [start, end, control].forEach(h => h.on('moving', sync));
        canvas.add(p, start, end, control).renderAll();
    }

    function generateWordBank() {
        const bank = document.getElementById('word-bank'); bank.innerHTML = '';
        const input = document.getElementById('passageInput').value.trim();
        const words = input.split(/\s+/);
        words.forEach((t, i) => {
            const s = document.createElement('span'); s.className = 'word-item'; s.textContent = t; s.id = `w-${i}`;
            s.onclick = () => {
                const txt = new fabric.IText(t, { left: 200, top: 200, fontSize: 20, fill: activeColor, bankId: s.id });
                canvas.add(txt).setActiveObject(txt).renderAll();
                s.classList.add('used');
            };
            bank.appendChild(s);
        });
    }

    function addFootnoteTag() {
        const t = new fabric.IText('[α]', { left: 150, top: 150, fontSize: 18, fill: '#800000', fontWeight: 'bold' });
        canvas.add(t).setActiveObject(t).renderAll();
    }

    function deleteSelected() {
        canvas.getActiveObjects().forEach(o => {
            if(o.bankId) document.getElementById(o.bankId).classList.remove('used');
            if(o.redDot) canvas.remove(o.redDot);
            if(o.isMainCurvePath && o.assocHandles) o.assocHandles.forEach(h => canvas.remove(h));
            if(!o.isHandle) canvas.remove(o);
        });
        canvas.discardActiveObject().renderAll();
    }

    async function saveWithPicker() {
        try {
            const json = JSON.stringify(canvas.toJSON(['bankId', 'noteData', 'isRedDot']));
            const handle = await window.showSaveFilePicker({ suggestedName: 'diagram.json', types: [{ accept: {'application/json': ['.json']} }] });
            const writable = await handle.createWritable();
            await writable.write(json);
            await writable.close();
        } catch(e) { console.log("Save cancelled"); }
    }

    window.onload = generateWordBank;
</script>
</body>
</html>
